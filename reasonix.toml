ption.Message)\"\n    }\n})", "Bash(# Check if favicon and local images exist\nGet-ChildItem -Path \"source\" -Recurse -Include \"*.ico\",\"*.png\",\"*.jpg\" -ErrorAction SilentlyContinue | Select-Object FullName, Length\n# Also check themes img dir\nGet-ChildItem -Path \"themes/anzhiyu/source/img\" -Recurse -ErrorAction SilentlyContinue | Select-Object FullName, Length | Format-Table -AutoSize)", "Edit", "Bash(Select-String -Path \"source/_posts/*.md\" -Pattern \"^tags:\" | ForEach-Object { \"$($_.Filename): $($_.Line)\" })", "Bash(hexo clean; hexo generate)", "Bash(hexo deploy:*)", "Bash(Select-String -Path \"public/tags/Android-Reverse/index.html\" -Pattern \"Android\" | Select-Object -First 5\n# Also check if there's a URL-encoded version\nGet-ChildItem \"public/tags/\" -Directory | ForEach-Object { $_.Name })", "Bash(# Check what URL the homepage links to for the Android Reverse tag\nSelect-String -Path \"public/index.html\" -Pattern \"Android.Reverse\" | Select-Object -First 5)", "Bash(# Check if there's a separate config file that overrides theme settings\nGet-ChildItem \".\" -Filter \"_config*\" -File | Select-Object Name\nGet-ChildItem \".\" -Filter \"*.yml\" -File | Select-Object Name)", "Bash(hexo clean; hexo generate; hexo deploy)", "Bash(mkdir -p:*)", "Bash(mkdir source/css -Force; mkdir source/js -Force)", "Bash(npx hexo:*)", "Bash(cmd /c:*)", "Bash(Get-ChildItem public/css/light-bg.css, public/js/light-bg.js | Select-Object Name, Length)", "Bash(cmd /c \"type public\\index.html | findstr light-bg\")", "Bash(cmd /c \"type public\\index.html | findstr \\\"data-theme\\\"\")", "Bash(cmd /c \"type public\\index.html | findstr \\\"<html\\\"\")", "Bash(cmd /c \"type public\\index.html | findstr /i scheme\")", "Bash(cmd /c \"dir public\\css\\light-bg.css 2>nul && echo EXISTS || echo NOT_FOUND\")", "Bash(cmd /c \"dir public\\js\\light-bg.js 2>nul && echo EXISTS || echo NOT_FOUND\")", "Bash(Test-Path public/css/light-bg.css; Test-Path public/js/light-bg.js)", "